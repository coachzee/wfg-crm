name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy on main branch pushes or manual triggers
    if: github.ref == 'refs/heads/main'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests before deploy
        run: pnpm test:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          OAUTH_SERVER_URL: ${{ secrets.OAUTH_SERVER_URL }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
          OWNER_OPEN_ID: ${{ secrets.OWNER_OPEN_ID }}
          OWNER_NAME: ${{ secrets.OWNER_NAME }}
          BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
          BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
          VITE_FRONTEND_FORGE_API_KEY: ${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}
          VITE_FRONTEND_FORGE_API_URL: ${{ secrets.VITE_FRONTEND_FORGE_API_URL }}

      - name: Build for production
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
          VITE_FRONTEND_FORGE_API_KEY: ${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}
          VITE_FRONTEND_FORGE_API_URL: ${{ secrets.VITE_FRONTEND_FORGE_API_URL }}
          VITE_APP_TITLE: ${{ secrets.VITE_APP_TITLE || 'WFG CRM' }}
          VITE_APP_LOGO: ${{ secrets.VITE_APP_LOGO }}

      - name: Deploy to Manus
        id: deploy
        run: |
          echo "Deployment to Manus is handled through the Manus Management UI"
          echo "For self-hosted deployments, configure your deployment target below"
          echo "url=https://your-app.manus.space" >> $GITHUB_OUTPUT
        # Uncomment and configure for your deployment target:
        # 
        # For Railway:
        # - name: Deploy to Railway
        #   uses: bervProject/railway-deploy@main
        #   with:
        #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
        #     service: wfg-crm
        #
        # For Vercel:
        # - name: Deploy to Vercel
        #   uses: amondnet/vercel-action@v25
        #   with:
        #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
        #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        #     vercel-args: '--prod'
        #
        # For Docker/Self-hosted:
        # - name: Build and push Docker image
        #   uses: docker/build-push-action@v5
        #   with:
        #     push: true
        #     tags: your-registry/wfg-crm:${{ github.sha }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."

  # Database migrations job (runs before deploy if needed)
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          # pnpm db:push
          echo "Note: Migrations are typically run manually or through Manus Management UI"
          echo "Uncomment the line above to enable automated migrations"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Scheduled sync job trigger
  trigger-sync:
    name: Trigger Data Sync
    runs-on: ubuntu-latest
    needs: deploy
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger sync endpoint
        run: |
          echo "To enable automated sync after deployment, configure SYNC_SECRET and APP_URL secrets"
          # curl -X POST "${{ secrets.APP_URL }}/api/cron/sync" \
          #   -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
          #   -H "Content-Type: application/json"
